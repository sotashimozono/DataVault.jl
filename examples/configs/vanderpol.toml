[study]
project_name  = "vanderpol"
total_samples = 5       # 異なる初期条件を 5 通り試す
outdir        = "out"

[datavault]
# mu だけがパスに入る。t_end / dt はスカラーなのでパスに含まない
path_keys = ["system.mu"]

[[paramsets]]

[paramsets.system]
mu    = [0.5, 1.0, 2.0, 5.0]   # Van der Pol 非線形性パラメータ
t_end = 200.0                    # 積分時間 (固定)
dt    = 0.01                     # RK4 ステップ幅 (固定)
